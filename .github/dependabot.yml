version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch non-breaking updates into a single PR to cut review noise.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # HeroUI ships components + theme as separate packages that must
      # move in lockstep — group them so we don't end up with mismatches.
      heroui:
        patterns:
          - "@heroui/*"
      next-core:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
