name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve e-Syrians? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's frustrating or missing today?
      placeholder: I find it difficult to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Feel free to sketch UI flows or attach mockups.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches? Why is this one better?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Does this require changes to the API, the web app, or both?
      options:
        - Web app only
        - API only
        - Both (cross-repo change)
        - Not sure

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples from other platforms, or anything else that helps explain the idea.
