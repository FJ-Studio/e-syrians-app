name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /polls
        2. Click "Create poll"
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, console output, or network response bodies if relevant.
    validations:
      required: true

  - type: dropdown
    id: locale
    attributes:
      label: Locale
      description: Which language were you using when the bug occurred?
      options:
        - English (en)
        - Arabic (ar)
        - Kurdish (ku)
        - Not applicable

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser name and version
      placeholder: "Chrome 131, Firefox 133, Safari 18"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.1, Windows 11, iOS 18, Android 15"

  - type: input
    id: node-version
    attributes:
      label: Node.js Version (if running locally)
      placeholder: "22.10.0"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, console logs, or anything else that might help.
